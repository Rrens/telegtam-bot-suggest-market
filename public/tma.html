<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Terminal Super App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --hint: #94a3b8;
        }

        body { font-family: 'Outfit', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; -webkit-font-smoothing: antialiased; }

        /* Navigasi */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(25px);
            display: flex; justify-content: space-around;
            padding: 10px 0 25px; border-top: 1px solid rgba(255,255,255,0.08); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--hint); font-size: 0.65rem; gap: 4px; transition: 0.2s; min-width: 60px; }
        .nav-item.active { color: var(--primary); transform: translateY(-2px); }
        .nav-icon { font-size: 1.2rem; }

        /* Views */
        .view { display: none; height: 100vh; padding: 20px 20px 100px; box-sizing: border-box; overflow-y: auto; scrollbar-width: none; }
        .view::-webkit-scrollbar { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Components */
        .card { background: var(--surface); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .search-input { width: 100%; padding: 14px 20px; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; outline: none; margin-bottom: 15px; box-sizing: border-box; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .symbol { font-weight: 700; font-size: 0.95rem; }
        .sub { font-size: 0.75rem; color: var(--hint); }
        .pos { color: var(--success); }
        .neg { color: var(--danger); }
        .tf-bar { display: flex; background: var(--surface); padding: 4px; border-radius: 10px; margin-bottom: 15px; }
        .tf-btn { flex: 1; padding: 6px 0; text-align: center; font-size: 0.7rem; font-weight: 700; color: var(--hint); border-radius: 6px; }
        .tf-btn.active { background: var(--bg); color: var(--primary); }
        .badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); }

        #chart-container { width: 100%; height: 45vh; border-radius: 16px; overflow: hidden; background: #000; margin-top: 10px; }
        .suggest-list { position: absolute; width: calc(100% - 40px); background: var(--surface); border-radius: 12px; z-index: 2000; display: none; border: 1px solid rgba(255,255,255,0.1); }
        .suggest-item { padding: 12px 20px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); }

        h1 { font-size: 1.6rem; font-weight: 800; margin: 0 0 20px; }
    </style>
</head>
<body>

    <!-- 1. HOME (Portfolio) -->
    <div id="view-home" class="view active">
        <h1>Terminal</h1>
        <div class="card" style="background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);">
            <div class="sub" style="color: white; opacity: 0.8;">TOTAL BALANCE</div>
            <div style="font-size: 2rem; font-weight: 800; margin: 5px 0;" id="home-balance">$0.00</div>
            <div id="home-pnl" style="font-size: 0.85rem; font-weight: 700;">+0.00% Today</div>
        </div>
        <div class="card">
            <div style="font-weight: 800; margin-bottom: 10px;">Assets</div>
            <div id="home-assets">Loading...</div>
        </div>
    </div>

    <!-- 2. CHARTS -->
    <div id="view-charts" class="view">
        <div style="position: relative;">
            <input type="text" id="chart-search" class="search-input" placeholder="Symbol (e.g. BTC, BBCA...)" oninput="handleSearch(this.value)">
            <div id="chart-suggest" class="suggest-list"></div>
        </div>
        <div class="tf-bar">
            <div class="tf-btn" onclick="setTF('1', this)">1m</div>
            <div class="tf-btn" onclick="setTF('15', this)">15m</div>
            <div class="tf-btn" onclick="setTF('60', this)">1h</div>
            <div class="tf-btn active" onclick="setTF('D', this)">1D</div>
        </div>
        <div id="chart-container"></div>
    </div>

    <!-- 3. INTEL (Today & Movers) -->
    <div id="view-intel" class="view">
        <h1>Market Intel</h1>
        <div class="card" id="intel-pulse">Loading sentiment...</div>
        <div class="card">
            <div style="font-weight: 800; margin-bottom: 10px;">Top Movers (24h)</div>
            <div id="intel-movers">Loading movers...</div>
        </div>
    </div>

    <!-- 4. SCANNER (Gems & Whale) -->
    <div id="view-scanner" class="view">
        <h1>Scanner</h1>
        <div class="card">
            <div style="font-weight: 800; margin-bottom: 10px;">💎 Solana Gems</div>
            <div id="scan-gems">Loading gems...</div>
        </div>
        <div class="card">
            <div style="font-weight: 800; margin-bottom: 10px;">🐋 Smart Money</div>
            <div id="scan-whale">Loading whales...</div>
        </div>
    </div>

    <!-- 5. SECURITY (RugCheck) -->
    <div id="view-security" class="view">
        <h1>Security</h1>
        <input type="text" id="rug-input" class="search-input" placeholder="Paste Token CA here...">
        <button onclick="runRugCheck()" style="width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 12px; color: white; font-weight: 800; margin-bottom: 20px;">🛡️ Check Security</button>
        <div id="rug-result"></div>
    </div>

    <!-- 6. ALERTS -->
    <div id="view-alerts" class="view">
        <h1>My Alerts</h1>
        <div id="alert-list">Loading alerts...</div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab('home')"><span class="nav-icon">📊</span><span>Home</span></div>
        <div class="nav-item" onclick="tab('charts')"><span class="nav-icon">📈</span><span>Charts</span></div>
        <div class="nav-item" onclick="tab('intel')"><span class="nav-icon">🔥</span><span>Intel</span></div>
        <div class="nav-item" onclick="tab('scanner')"><span class="nav-icon">💎</span><span>Scan</span></div>
        <div class="nav-item" onclick="tab('security')"><span class="nav-icon">🛡️</span><span>Safe</span></div>
        <div class="nav-item" onclick="tab('alerts')"><span class="nav-icon">🔔</span><span>Alert</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();
        const userId = tg.initDataUnsafe?.user?.id || 653776943;
        let curSymbol = 'BINANCE:BTCUSDT';
        let curTF = 'D';

        function tab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${id}`).classList.add('active');
            const idx = ['home', 'charts', 'intel', 'scanner', 'security', 'alerts'].indexOf(id);
            document.querySelectorAll('.nav-item')[idx].classList.add('active');
            
            if (id === 'home') loadHome();
            if (id === 'charts') renderChart(curSymbol);
            if (id === 'intel') loadIntel();
            if (id === 'scanner') loadScanner();
            if (id === 'alerts') loadAlerts();
        }

        async function loadHome() {
            const res = await fetch(`/api/tma/portfolio?user_id=${userId}`);
            const data = await res.json();
            document.getElementById('home-balance').innerText = `$${data.totalValue.toLocaleString()}`;
            document.getElementById('home-pnl').innerText = `${data.pnl>=0?'+':''}$${data.pnl.toLocaleString()} Today`;
            let html = '';
            data.assets.forEach(a => {
                html += `<div class="list-item" onclick="tab('charts'); loadChart('${a.currency==='Rp'?'IDX':'BINANCE'}', '${a.symbol}')">
                    <div><div class="symbol">${a.symbol}</div><div class="sub">${a.amount} Units</div></div>
                    <div style="text-align:right"><div class="symbol">${a.currency}${a.currentValue.toLocaleString()}</div><div class="${a.pnl>=0?'pos':'neg'}">${a.pnl>=0?'+':''}${a.pnl.toLocaleString()}</div></div>
                </div>`;
            });
            document.getElementById('home-assets').innerHTML = html || 'No assets.';
        }

        async function loadIntel() {
            const [pRes, tRes] = await Promise.all([fetch('/api/tma/market-pulse'), fetch('/api/tma/today')]);
            const pData = await pRes.json();
            const tData = await tRes.json();
            const fg = pData.fearGreed || { value: '??', classification: 'N/A' };
            document.getElementById('intel-pulse').innerHTML = `
                <div style="font-size: 1rem; font-weight: 800; margin-bottom: 10px;">Fear & Greed Index</div>
                <div class="list-item"><div class="symbol">State</div><div class="symbol" style="color:var(--primary)">${fg.value} (${fg.classification})</div></div>
            `;
            let mHtml = '';
            tData.forEach(m => {
                mHtml += `<div class="list-item">
                    <div class="symbol">${m.symbol}</div>
                    <div style="text-align:right"><div class="symbol">$${m.price.toLocaleString()}</div><div class="${m.change>=0?'pos':'neg'}">${m.change.toFixed(2)}%</div></div>
                </div>`;
            });
            document.getElementById('intel-movers').innerHTML = mHtml || 'No data.';
        }

        async function loadScanner() {
            const res = await fetch('/api/tma/gems');
            const data = await res.json();
            let gHtml = '';
            data.gems.forEach(g => {
                gHtml += `<div class="list-item"><div><div class="symbol">${g.symbol}</div><div class="sub">${g.name}</div></div><div class="badge">💎 Graduated</div></div>`;
            });
            document.getElementById('scan-gems').innerHTML = gHtml || 'No gems.';
            let wHtml = '';
            data.whale.forEach(w => {
                wHtml += `<div class="list-item"><div><div class="symbol">${w.symbol}</div><div class="sub">${w.type}</div></div><div class="pos">$${w.amount.toLocaleString()}</div></div>`;
            });
            document.getElementById('scan-whale').innerHTML = wHtml || 'No whale activity.';
        }

        async function runRugCheck() {
            const ca = document.getElementById('rug-input').value;
            if (!ca) return;
            document.getElementById('rug-result').innerHTML = 'Checking...';
            const res = await fetch(`/api/tma/rugcheck?ca=${ca}`);
            const data = await res.json();
            document.getElementById('rug-result').innerHTML = `
                <div class="card" style="border-left: 4px solid ${data.score < 50 ? 'var(--success)' : 'var(--danger)'}">
                    <div style="font-weight:800; margin-bottom:10px;">Risk Score: ${data.score}/100</div>
                    <div class="sub">${data.summary || 'Simulation: No major issues found.'}</div>
                </div>
            `;
        }

        async function loadAlerts() {
            const res = await fetch(`/api/tma/alerts?user_id=${userId}`);
            const data = await res.json();
            let html = '';
            data.forEach(a => {
                html += `<div class="card"><div class="list-item"><div><div class="symbol">${a.symbol}</div><div class="sub">${a.indicator} ${a.condition} ${a.threshold}</div></div><button onclick="deleteAlert(${a.id})" style="background:var(--danger); border:none; color:white; padding:4px 8px; border-radius:4px; font-size:0.7rem;">Delete</button></div></div>`;
            });
            document.getElementById('alert-list').innerHTML = html || 'No alerts set.';
        }

        async function deleteAlert(id) {
            await fetch('/api/tma/alerts/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, user_id: userId }) });
            loadAlerts();
        }

        function handleSearch(val) {
            const list = document.getElementById('chart-suggest');
            if (!val) { list.style.display = 'none'; return; }
            val = val.toUpperCase();
            list.innerHTML = `<div class="suggest-item" onclick="loadChart('BINANCE', '${val}')">BINANCE:${val}</div><div class="suggest-item" onclick="loadChart('IDX', '${val}')">IDX:${val}</div>`;
            list.style.display = 'block';
        }

        function loadChart(broker, symbol) {
            curSymbol = `${broker}:${symbol.toUpperCase()}`;
            document.getElementById('chart-suggest').style.display = 'none';
            document.getElementById('chart-search').value = '';
            renderChart(curSymbol);
        }

        function setTF(tf, el) {
            curTF = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            renderChart(curSymbol);
        }

        function renderChart(symbol) {
            new TradingView.widget({ "autosize": true, "symbol": symbol, "interval": curTF, "timezone": "Asia/Jakarta", "theme": "dark", "style": "1", "locale": "en", "container_id": "chart-container" });
        }

        loadHome();
    </script>
</body>
</html>
