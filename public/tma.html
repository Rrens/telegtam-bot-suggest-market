<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --primary: #3b82f6;
            --accent: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --hint: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Navigasi */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(25px);
            display: flex; justify-content: space-around;
            padding: 12px 0 28px;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 1000;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--hint); font-size: 0.7rem; gap: 4px;
            transition: all 0.2s ease;
        }
        .nav-item.active { color: var(--primary); transform: translateY(-2px); }
        .nav-icon { font-size: 1.4rem; margin-bottom: 2px; }

        /* Content Views */
        .view {
            display: none; height: 100vh;
            padding: 20px 20px 120px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .view.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Search & Suggester */
        .search-container { position: relative; margin-bottom: 15px; }
        .search-input {
            width: 100%; padding: 14px 20px; background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
            color: white; font-family: inherit; font-size: 0.9rem;
            box-sizing: border-box; outline: none;
        }
        .suggest-list {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--surface); border-radius: 12px;
            margin-top: 8px; border: 1px solid rgba(255,255,255,0.1);
            z-index: 2000; max-height: 400px; overflow-y: auto;
            display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        .suggest-header {
            padding: 10px 20px; font-size: 0.65rem; font-weight: 800;
            color: var(--hint); text-transform: uppercase; letter-spacing: 1px;
            background: rgba(255,255,255,0.03);
        }
        .suggest-item {
            padding: 12px 20px; font-size: 0.85rem; font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .suggest-item:active { background: var(--primary); }
        .broker-tag { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.1); color: var(--hint); }

        /* Asset Info */
        .asset-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 15px; padding: 0 4px;
        }
        .asset-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
        .asset-price { font-size: 1.1rem; font-weight: 600; color: var(--primary); }

        #chart-container {
            width: 100%; height: 55vh;
            border-radius: 20px; overflow: hidden;
            background: #000; border: 1px solid rgba(255,255,255,0.1);
        }

        .quick-pills {
            display: flex; gap: 10px; overflow-x: auto;
            margin-bottom: 18px; padding-bottom: 5px;
            scrollbar-width: none;
        }
        .pill {
            background: var(--surface); padding: 8px 16px; border-radius: 100px;
            font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap; cursor: pointer;
        }
        .pill.active { background: var(--primary); color: white; border-color: var(--primary); }

        .card { background: var(--surface); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <!-- CHARTS -->
    <div id="view-chart" class="view active">
        <div class="search-container">
            <input type="text" id="symbolSearch" class="search-input" placeholder="Ketik Kode Aset (e.g. BBCA, PEPE...)" oninput="handleSearch(this.value)">
            <div id="suggestList" class="suggest-list"></div>
        </div>

        <div class="quick-pills">
            <div class="pill active" onclick="loadWithBroker('BINANCE', 'BTCUSDT')">₿ BTC</div>
            <div class="pill" onclick="loadWithBroker('IDX', 'BBCA')">🏦 BBCA</div>
            <div class="pill" onclick="loadWithBroker('BINANCE', 'SOLUSDT')">☀️ SOL</div>
            <div class="pill" onclick="loadWithBroker('OANDA', 'XAUUSD')">✨ Gold</div>
            <div class="pill" onclick="loadWithBroker('NYSE', 'AAPL')">🍎 Apple</div>
        </div>
        
        <div class="tf-bar">
            <div class="tf-btn" onclick="changeTF('1', this)">1m</div>
            <div class="tf-btn" onclick="changeTF('5', this)">5m</div>
            <div class="tf-btn" onclick="changeTF('15', this)">15m</div>
            <div class="tf-btn" onclick="changeTF('60', this)">1h</div>
            <div class="tf-btn active" onclick="changeTF('D', this)">1D</div>
        </div>

        <div class="asset-header">
            <div>
                <div class="asset-title" id="displaySymbol">BTCUSDT</div>
                <div class="sub" id="exchangeSource">BINANCE Real-time</div>
            </div>
            <div class="asset-price" id="displayPrice">Live</div>
        </div>

        <div id="chart-container"></div>
    </div>

    <!-- HOME/PORTO & MARKET (Simplified for demo) -->
    <div id="view-porto" class="view"><h1>Portfolio</h1><div class="card" id="portoList">Loading...</div></div>
    <div id="view-market" class="view"><h1>Market</h1><div class="card" id="watchList">Loading...</div></div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="switchTab('porto')"><span class="nav-icon">📊</span><span>Home</span></div>
        <div class="nav-item active" onclick="switchTab('chart')"><span class="nav-icon">📈</span><span>Charts</span></div>
        <div class="nav-item" onclick="switchTab('market')"><span class="nav-icon">🔥</span><span>Market</span></div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        let currentSymbol = 'BINANCE:BTCUSDT';
        let currentTF = 'D';
        
        function handleSearch(val) {
            const list = document.getElementById('suggestList');
            if (!val || val.length < 1) { list.style.display = 'none'; return; }
            
            val = val.toUpperCase().replace('.JK', '');
            
            let html = `
                <div class="suggest-header">Pilih Broker / Pasar</div>
                <div class="suggest-item" onclick="loadWithBroker('BINANCE', '${val}')">
                    <span>${val} <span class="broker-tag">Crypto</span></span><span style="color:var(--hint)">Binance</span>
                </div>
                <div class="suggest-item" onclick="loadWithBroker('IDX', '${val}')">
                    <span>${val} <span class="broker-tag">Stock Indo</span></span><span style="color:var(--hint)">Bursa Efek Indo</span>
                </div>
                <div class="suggest-item" onclick="loadWithBroker('OANDA', '${val}')">
                    <span>${val} <span class="broker-tag">Forex/Gold</span></span><span style="color:var(--hint)">Oanda</span>
                </div>
                <div class="suggest-item" onclick="loadWithBroker('NYSE', '${val}')">
                    <span>${val} <span class="broker-tag">Stock US</span></span><span style="color:var(--hint)">NYSE</span>
                </div>
                <div class="suggest-item" onclick="loadWithBroker('NASDAQ', '${val}')">
                    <span>${val} <span class="broker-tag">Stock US</span></span><span style="color:var(--hint)">NASDAQ</span>
                </div>
            `;
            
            list.innerHTML = html;
            list.style.display = 'block';
        }

        function loadWithBroker(broker, symbol) {
            symbol = symbol.toUpperCase();
            
            // Auto-append USDT for Binance if not present
            if (broker === 'BINANCE' && !symbol.endsWith('USDT') && !['BTC', 'ETH', 'SOL', 'BNB'].includes(symbol)) {
                // Keep it simple, but usually it needs USDT
                if (symbol.length < 6) symbol += 'USDT';
            }
            
            const fullSymbol = `${broker}:${symbol}`;
            currentSymbol = fullSymbol;
            
            document.getElementById('displaySymbol').innerText = symbol;
            document.getElementById('exchangeSource').innerText = broker + ' Real-time';
            document.getElementById('suggestList').style.display = 'none';
            document.getElementById('symbolSearch').value = '';
            
            renderChart(fullSymbol);
        }

        function renderChart(symbol) {
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": currentTF,
                "timezone": "Asia/Jakarta",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "container_id": "chart-container"
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${tabId}`).classList.add('active');
            const idx = ['porto', 'chart', 'market'].indexOf(tabId);
            document.querySelectorAll('.nav-item')[idx].classList.add('active');
        }

        // Initial load
        renderChart(currentSymbol);
    </script>
</body>
</html>
