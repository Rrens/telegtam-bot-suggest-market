<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Antigravity | Pro Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #0f172a);
            --text: var(--tg-theme-text-color, #f8fafc);
            --hint: var(--tg-theme-hint-color, #94a3b8);
            --primary: var(--tg-theme-button-color, #3b82f6);
            --card: rgba(255, 255, 255, 0.05);
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            overflow: hidden;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-around;
            padding: 12px 0 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--hint); font-size: 0.65rem; font-weight: 600; gap: 4px;
        }

        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.4rem; }

        /* Views */
        .view {
            display: none; height: 100vh;
            padding: 16px 16px 120px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .view.active { display: block; }

        .card {
            background: var(--card); border-radius: 20px; padding: 20px;
            margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { font-size: 1.2rem; font-weight: 800; margin: 0 0 20px; }

        .list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        .symbol { font-weight: 700; font-size: 0.95rem; }
        .sub { font-size: 0.75rem; color: var(--hint); }

        /* Chart View Specific */
        #chart-container {
            width: 100%; height: 60vh;
            border-radius: 16px; overflow: hidden;
            background: #000; margin-bottom: 16px;
        }

        .tf-bar {
            display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto;
            padding-bottom: 8px;
        }

        .tf-btn {
            padding: 6px 12px; background: var(--card);
            border-radius: 8px; font-size: 0.75rem; font-weight: 600;
            white-space: nowrap; border: 1px solid rgba(255,255,255,0.1);
            color: var(--hint);
        }

        .tf-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .search-bar {
            display: flex; gap: 10px; margin-bottom: 16px;
        }
        .search-bar input {
            flex: 1; padding: 12px; background: var(--card);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: white; outline: none;
        }

        .pos { color: var(--success); }
        .neg { color: var(--danger); }
    </style>
</head>
<body>

    <!-- PORTFOLIO VIEW -->
    <div id="view-porto" class="view active">
        <h1>My Portfolio</h1>
        <div class="card" id="portCard">
            <div style="font-size: 0.7rem; color: var(--hint); text-transform: uppercase;">Total Balance</div>
            <div style="font-size: 2rem; font-weight: 800;" id="totalBalance">$0.00</div>
            <div id="totalPnl" class="pos" style="font-weight: 700; margin-top: 4px;">+0.00%</div>
        </div>
        <div class="card">
            <div style="font-size: 0.8rem; font-weight: 700; margin-bottom: 12px;">Holdings</div>
            <div id="portoList">Loading...</div>
        </div>
    </div>

    <!-- CHART VIEW -->
    <div id="view-chart" class="view">
        <h1>Live Charts</h1>
        
        <div class="search-bar">
            <input type="text" id="symbolSearch" placeholder="Search (e.g. BTCUSDT, SOL...)">
            <button class="tf-btn active" style="padding: 0 20px;" onclick="loadChart()">View</button>
        </div>

        <div class="tf-bar">
            <div class="tf-btn" data-tf="1" onclick="changeTF('1', this)">1m</div>
            <div class="tf-btn" data-tf="5" onclick="changeTF('5', this)">5m</div>
            <div class="tf-btn active" data-tf="15" onclick="changeTF('15', this)">15m</div>
            <div class="tf-btn" data-tf="60" onclick="changeTF('60', this)">1h</div>
            <div class="tf-btn" data-tf="240" onclick="changeTF('240', this)">4h</div>
            <div class="tf-btn" data-tf="D" onclick="changeTF('D', this)">1D</div>
        </div>

        <div id="chart-container"></div>

        <div class="card" id="assetInfo" style="display: none;">
            <div id="infoSymbol" style="font-weight: 800; font-size: 1.2rem;">BTCUSDT</div>
            <div id="infoPrice" style="font-size: 1.1rem; margin-top: 4px;">$0.00</div>
        </div>
    </div>

    <!-- MARKET VIEW -->
    <div id="view-market" class="view">
        <h1>Market Pulse</h1>
        <div class="card" id="watchList">Loading watchlist...</div>
        <div class="card">
            <div style="font-size: 0.8rem; font-weight: 700; margin-bottom: 12px;">Recent AI Signals</div>
            <div id="signalsList"></div>
        </div>
    </div>

    <!-- SCANNER VIEW -->
    <div id="view-scan" class="view">
        <h1>Rug Scanner</h1>
        <div class="card">
            <input type="text" id="scanCa" placeholder="Paste CA here..." style="width:100%; padding:14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:white; margin-bottom:12px; box-sizing:border-box;">
            <button onclick="runScan()" style="width:100%; padding:16px; background:var(--primary); border:none; border-radius:12px; color:white; font-weight:800;">Analyze Contract</button>
        </div>
        <div id="scanResult"></div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('porto')">
            <span class="nav-icon">📊</span><span>Porto</span>
        </div>
        <div class="nav-item" onclick="switchTab('chart')">
            <span class="nav-icon">📉</span><span>Chart</span>
        </div>
        <div class="nav-item" onclick="switchTab('market')">
            <span class="nav-icon">🔥</span><span>Market</span>
        </div>
        <div class="nav-item" onclick="switchTab('scan')">
            <span class="nav-icon">🛡️</span><span>Scan</span>
        </div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const userId = tg.initDataUnsafe?.user?.id || 12345;
        let currentSymbol = 'BINANCE:BTCUSDT';
        let currentTF = '15';
        let tvWidget = null;

        function switchTab(tabId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${tabId}`).classList.add('active');
            
            // Highlight nav
            const navItems = document.querySelectorAll('.nav-item');
            const idx = ['porto', 'chart', 'market', 'scan'].indexOf(tabId);
            navItems[idx].classList.add('active');

            if (tabId === 'porto') loadPorto();
            if (tabId === 'market') loadMarket();
            if (tabId === 'chart') loadChart();
        }

        function loadChart(symbol = null) {
            if (symbol) {
                // Format symbol for TV
                if (!symbol.includes(':')) {
                    if (symbol.endsWith('.JK')) symbol = 'IDX:' + symbol.replace('.JK', '');
                    else symbol = 'BINANCE:' + symbol;
                }
                currentSymbol = symbol;
                document.getElementById('symbolSearch').value = symbol.split(':').pop();
            } else {
                const searchVal = document.getElementById('symbolSearch').value.toUpperCase();
                if (searchVal) {
                    currentSymbol = searchVal.includes(':') ? searchVal : 'BINANCE:' + searchVal;
                }
            }

            tvWidget = new TradingView.widget({
                "autosize": true,
                "symbol": currentSymbol,
                "interval": currentTF,
                "timezone": "Asia/Jakarta",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": "chart-container"
            });
        }

        function changeTF(tf, el) {
            currentTF = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            loadChart();
        }

        async function loadPorto() {
            try {
                const res = await fetch(`/api/tma/portfolio?user_id=${userId}`);
                const data = await res.json();
                document.getElementById('totalBalance').innerText = `$${data.totalValue.toLocaleString()}`;
                document.getElementById('totalPnl').innerText = `${data.pnl >= 0 ? '+' : ''}$${data.pnl.toLocaleString()}`;
                document.getElementById('totalPnl').className = data.pnl >= 0 ? 'pos' : 'neg';

                let html = '';
                data.assets.forEach(a => {
                    html += `
                        <div class="list-item" onclick="viewOnChart('${a.symbol}')">
                            <div><div class="symbol">${a.symbol}</div><div class="sub">${a.amount} units</div></div>
                            <div style="text-align:right">
                                <div class="symbol">$${a.currentValue.toLocaleString()}</div>
                                <div class="${a.pnl >= 0 ? 'pos' : 'neg'}" style="font-size:0.7rem">${a.pnl >= 0 ? '+' : ''}${a.pnl.toLocaleString()}</div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('portoList').innerHTML = html || 'No holdings';
            } catch (e) {}
        }

        async function loadMarket() {
            try {
                const [mRes, wRes] = await Promise.all([
                    fetch('/api/tma/market-pulse'),
                    fetch(`/api/tma/watchlist?user_id=${userId}`)
                ]);
                const market = await mRes.json();
                const watch = await wRes.json();

                let wHtml = '<div style="font-size:0.8rem; font-weight:700; margin-bottom:12px;">Watchlist</div>';
                watch.forEach(w => {
                    wHtml += `
                        <div class="list-item" onclick="viewOnChart('${w.symbol}')">
                            <div class="symbol">${w.symbol}</div>
                            <div style="text-align:right">
                                <div class="symbol">$${w.price.toLocaleString()}</div>
                                <div class="${w.change24h >= 0 ? 'pos' : 'neg'}" style="font-size:0.7rem">${w.change24h.toFixed(2)}%</div>
                            </div>
                        </div>
                    `;
                });
                document.getElementById('watchList').innerHTML = wHtml || 'Watchlist empty';

                let sHtml = '';
                market.signals.forEach(s => {
                    sHtml += `<div class="list-item" onclick="viewOnChart('${s.symbol}')">
                        <div><div class="symbol">${s.symbol}</div><div class="sub">${s.trend}</div></div>
                        <div class="symbol" style="color:var(--primary)">${s.confidence}%</div>
                    </div>`;
                });
                document.getElementById('signalsList').innerHTML = sHtml;
            } catch (e) {}
        }

        function viewOnChart(symbol) {
            switchTab('chart');
            loadChart(symbol);
        }

        async function runScan() {
            const ca = document.getElementById('scanCa').value.trim();
            if (!ca) return;
            const res = await fetch(`https://api.rugcheck.xyz/v1/tokens/${ca}/report`);
            const report = await res.json();
            document.getElementById('scanResult').innerHTML = `
                <div class="card">
                    <div class="sub">Security Score</div>
                    <div style="font-size:1.5rem; font-weight:800; color:${report.score < 200 ? 'var(--success)' : 'var(--danger)'}">${report.score}</div>
                    <div class="sub" style="margin-top:10px">LP Burned: ${report.markets?.[0]?.lp?.lpBurned ? '✅' : '❌'}</div>
                </div>
            `;
        }

        // Init
        loadPorto();
    </script>
</body>
</html>
