<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Bot | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-dark));
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            font-weight: 800;
            margin-bottom: 40px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px 0 var(--accent-glow);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 10px 0;
            color: #fff;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        td.content {
            font-family: monospace;
            color: #a78bfa;
        }

        /* Type Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge.command { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .badge.message { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge.callback { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }

    </style>
</head>
<body>

    <h1>🚀 Admin Control Center</h1>

    <div class="grid" id="statsGrid">
        <div class="glass-card">
            <div class="stat-label">Total Users</div>
            <div class="stat-value" id="statUsers">-</div>
        </div>
        <div class="glass-card">
            <div class="stat-label">Assets Tracked</div>
            <div class="stat-value" id="statAssets">-</div>
        </div>
        <div class="glass-card">
            <div class="stat-label">Signals Generated</div>
            <div class="stat-value" id="statSignals">-</div>
        </div>
        <div class="glass-card">
            <div class="stat-label">Total Bot Interactions</div>
            <div class="stat-value" id="statChats">-</div>
        </div>
    </div>

    <div class="glass-card">
        <h2>Live Chat Stream (Top 50)</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>User</th>
                        <th>Type</th>
                        <th>Content</th>
                    </tr>
                </thead>
                <tbody id="chatTableBody">
                    <tr><td colspan="4" style="text-align:center;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Get token from current URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        async function fetchStats() {
            try {
                const res = await fetch(`/api/stats?token=${token}`);
                const data = await res.json();
                document.getElementById('statUsers').innerText = data.users;
                document.getElementById('statAssets').innerText = data.assets;
                document.getElementById('statSignals').innerText = data.signals;
                document.getElementById('statChats').innerText = data.chats;
            } catch (err) {
                console.error('Stats fetch error:', err);
            }
        }

        async function fetchChats() {
            try {
                const res = await fetch(`/api/chats?token=${token}`);
                const logs = await res.json();
                
                const tbody = document.getElementById('chatTableBody');
                tbody.innerHTML = '';
                
                if (logs.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No activity logs found.</td></tr>';
                    return;
                }

                logs.forEach(log => {
                    const date = new Date(log.created_at).toLocaleString();
                    const badgeClass = log.type || 'message';
                    
                    tbody.innerHTML += `
                        <tr>
                            <td style="color:var(--text-muted); font-size:0.9rem;">${date}</td>
                            <td><strong>${log.username || log.user_id}</strong></td>
                            <td><span class="badge ${badgeClass}">${log.type}</span></td>
                            <td class="content">${log.content}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error('Chats fetch error:', err);
            }
        }

        // Init
        if (token) {
            fetchStats();
            fetchChats();
            
            // Auto refresh every 10 seconds
            setInterval(() => {
                fetchStats();
                fetchChats();
            }, 10000);
        } else {
            alert('Admin token is missing in the URL!');
        }
    </script>
</body>
</html>
